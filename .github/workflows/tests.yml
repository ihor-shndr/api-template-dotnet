name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore tests/Books.UnitTests/Books.UnitTests.csproj

      - name: Run tests
        run: dotnet test tests/Books.UnitTests/Books.UnitTests.csproj --configuration Release --no-restore
